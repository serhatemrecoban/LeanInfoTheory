name: Lean build and placeholder check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check generated website blueprint is current
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_website_blueprint.py
          python scripts/generate_website_api_index.py
          python scripts/check_website.py
          git diff --exit-code -- \
            home_page/blueprint/dep_graph_document.html \
            home_page/blueprint/module_graph.json \
            home_page/docs/api-index.html \
            home_page/docs/declaration_index.json

      - name: Check Lean source has no placeholders
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '(^|[^[:alnum:]_])(sorry|admit|axiom|opaque|undefined)([^[:alnum:]_]|$)' \
              --include='*.lean' LeanInfoTheory LeanInfoTheory.lean; then
            echo "::error::Lean source contains a placeholder or unapproved axiom."
            exit 1
          fi

      - uses: leanprover/lean-action@v1

      - name: Build separately importable modules
        shell: bash
        run: |
          set -euo pipefail
          lake build LeanInfoTheory.Shannon.EntropyBounds
          lake build LeanInfoTheory.Shannon.SemanticBridge
          lake build LeanInfoTheory.MathlibFragments
          lake build LeanInfoTheory.Certificate.Submodularity
          lake build LeanInfoTheory.Examples
